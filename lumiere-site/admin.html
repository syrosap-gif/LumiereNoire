<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Lumière Noire</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      padding: 30px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .sub {
      color: #888;
      margin-bottom: 30px;
    }
    .topbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    button {
      background: transparent;
      border: 1px solid #444;
      color: #f0f0f0;
      padding: 12px 18px;
      cursor: pointer;
      transition: .2s;
    }
    button:hover {
      border-color: #f0f0f0;
    }
    .danger {
      border-color: #8b2b2b;
      color: #ffb3b3;
    }
    .danger:hover {
      border-color: #ff6b6b;
      color: #fff;
    }
    .card {
      border: 1px solid #222;
      background: #111;
      padding: 20px;
      margin-bottom: 16px;
    }
    .row {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr auto;
      gap: 16px;
      align-items: center;
    }
    .label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .value {
      color: #f0f0f0;
      line-height: 1.5;
    }
    .empty {
      color: #666;
      padding: 30px;
      border: 1px dashed #333;
      text-align: center;
    }
    @media (max-width: 900px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Админка бронирований</h1>
    <p class="sub">Lumière Noire · отмена броней</p>

    <div class="topbar">
      <button id="refreshBtn">Обновить</button>
      <button id="logoutBtn">Выйти</button>
    </div>

    <div id="list"></div>
  </div>

  <script>
    const PASSWORD = 'lumiere2025';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz11tu_56wCzmKP-hI8iJEV9Ou5SHDpAA6v6e_81Vt8yStChI9iilbZBDymfvQrZ2c4/exec';

    function auth() {
      const saved = localStorage.getItem('ln_admin_auth');
      if (saved === 'ok') return true;

      const entered = prompt('Введите пароль');
      if (entered === PASSWORD) {
        localStorage.setItem('ln_admin_auth', 'ok');
        return true;
      }

      document.body.innerHTML = '<div style="padding:40px;color:#fff;background:#0a0a0a;font-family:Arial;">Неверный пароль</div>';
      return false;
    }

    function formatPrice(value) {
      return new Intl.NumberFormat('ru-RU').format(Number(value || 0)) + ' ₽';
    }

    async function loadBookings() {
      const list = document.getElementById('list');
      list.innerHTML = '<div class="empty">Загрузка...</div>';

      try {
        const res = await fetch(APPS_SCRIPT_URL + '?action=bookings');
        const data = await res.json();

        if (!data.success) {
          list.innerHTML = '<div class="empty">Не удалось загрузить брони</div>';
          return;
        }

        const items = data.bookings || [];

        if (!items.length) {
          list.innerHTML = '<div class="empty">Активных броней нет</div>';
          return;
        }

        items.sort((a, b) => {
          if (a.date === b.date) return String(a.start).localeCompare(String(b.start));
          return String(a.date).localeCompare(String(b.date));
        });

        list.innerHTML = items.map(item => `
          <div class="card">
            <div class="row">
              <div>
                <div class="label">Дата и время</div>
                <div class="value">${item.date} · ${item.start} — ${item.end}</div>
              </div>
              <div>
                <div class="label">Клиент</div>
                <div class="value">${item.name || '-'}</div>
                <div class="value" style="color:#888;">${item.contact || ''}</div>
              </div>
              <div>
                <div class="label">Услуга</div>
                <div class="value">${item.service || '-'}</div>
              </div>
              <div>
                <div class="label">Сумма</div>
                <div class="value">${formatPrice(item.total)}</div>
              </div>
              <div>
                <button class="danger" onclick="cancelBooking('${item.id}')">Отменить</button>
              </div>
            </div>
            <div style="margin-top:14px;">
              <div class="label">Дополнительно</div>
              <div class="value">${item.extras || 'Нет'}</div>
            </div>
            <div style="margin-top:10px;">
              <div class="label">Комментарий</div>
              <div class="value">${item.message || 'Нет комментария'}</div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error(error);
        list.innerHTML = '<div class="empty">Ошибка загрузки. Если страница открыта просто файлом с компьютера, лучше открыть сайт через хостинг или Live Server.</div>';
      }
    }

    async function cancelBooking(id) {
      if (!confirm('Точно отменить эту бронь?')) return;

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'cancel',
            id: id
          })
        });

        const data = await res.json();

        if (data.success) {
          loadBookings();
        } else {
          alert(data.message || 'Не удалось отменить бронь');
        }
      } catch (error) {
        console.error(error);
        alert('Ошибка соединения');
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadBookings);
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('ln_admin_auth');
      location.reload();
    });

    if (auth()) {
      loadBookings();
    }
  </script>
</body>
</html>
